<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <!-- Content-Security-Policy: a blast-radius backstop, not the primary defence.
       Each source is an origin the app actually talks to (see the module that uses
       it). No 'unsafe-inline' is needed anywhere — every <script> is external and
       handlers are wired via addEventListener; styles are set through the CSSOM
       (el.style.*), which CSP doesn't govern. frame-ancestors / report-uri /
       report-only are ignored in a meta CSP (they need real HTTP headers, which
       Pages can't set), so this is enforcing-only. -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net https://www.youtube.com https://s.ytimg.com;
    style-src 'self' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    img-src 'self';
    connect-src 'self' https://ws.audioscrobbler.com https://www.googleapis.com https://*.supabase.co wss://*.supabase.co;
    frame-src https://www.youtube.com https://www.youtube-nocookie.com;
    object-src 'none';
    base-uri 'self'" />

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>tubalr</title>

  <!-- Tints the browser chrome to match the header. Not PWA machinery — plain
       pages get this too. The href is relative so it resolves under the GitHub
       Pages subpath (/tubalr-2026/). -->
  <meta name="theme-color" content="#1a1723" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />

  <!-- Pacifico is the one signature the original leaned on; everything else is plain CSS. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="stage">
    <h1 class="brand"><a href="./" aria-label="tubalr — home"><img class="brand-icon" src="icons/icon-192.png" alt="" /><span class="brand-word">tubalr</span></a></h1>

    <form id="search-form" class="search" autocomplete="off">
      <input
        id="search-input"
        class="search-input"
        type="text"
        placeholder="Enter an artist or band"
        aria-label="Artist or band"
        autofocus
      />
      <div class="modes">
        <button type="submit" data-mode="only" class="btn btn-mode">only</button>
        <button type="button" data-mode="similar" class="btn btn-mode">similar</button>
      </div>
    </form>

    <p class="hint">
      Type an artist, then pick a mode. only plays their top tracks;
      similar weaves in tracks from related artists — one continuous
      YouTube session, minus the clutter. Or skip typing and pick a
      genre below.
    </p>

    <!-- Recent searches (landing view only; hidden once a session runs, like the
         hint). Populated from localStorage by ui.js; stays hidden while empty. -->
    <section class="recent" id="recent" hidden>
      <ul id="recent-list" class="recent-list"></ul>
    </section>

    <!-- Curated genre shortcuts (landing view only): genre mode has no mode
         button/free-text entry of its own — this chip list is the only way
         in, each one filling the input and calling build("genre") directly
         (see the click handler in js/ui.js wire()). Populated from
         js/genres.js's MRU-ordered, localStorage-backed list; only the first
         few show until "+N more" is clicked. -->
    <section class="genre-chips" id="genre-chips">
      <ul id="genre-chip-list" class="genre-chip-list"></ul>
    </section>

    <section class="now-playing">
      <div class="player-frame">
        <div id="player"></div>
      </div>
    </section>
  </main>

  <aside class="playlist-col" aria-label="Playlist">
    <!-- Two tabs over one panel: the live Queue and the Recent searches (so past
         sessions stay reachable mid-playback). The Recent tab shares its chip
         markup and store with the landing-view #recent list; it's hidden until
         there's a recent to show. -->
    <div class="panel-tabs" role="tablist" aria-label="Playlist and recent searches">
      <button type="button" class="panel-tab active" id="tab-queue" role="tab" aria-selected="true" aria-controls="playlist">Queue</button>
      <button type="button" class="panel-tab" id="tab-recent" role="tab" aria-selected="false" aria-controls="panel-recent" hidden>Recent</button>
    </div>

    <ul id="playlist" class="playlist" role="tabpanel" aria-labelledby="tab-queue"></ul>

    <div id="panel-recent" class="recent-panel" role="tabpanel" aria-labelledby="tab-recent" hidden>
      <ul class="recent-list" id="recent-panel-list"></ul>
    </div>

    <!-- Transport lives at the bottom of the playlist panel on every viewport. -->
    <div class="transport">
      <button id="btn-shuffle" class="ctrl" title="Shuffle" aria-label="Shuffle">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      </button>
      <button id="btn-prev" class="ctrl" title="Previous" aria-label="Previous">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke-width="2"/></svg>
      </button>
      <button id="btn-play" class="ctrl ctrl-play" title="Play / Pause" aria-label="Play">
        <!-- Single icon; JS swaps it to show the action the button performs. -->
        <svg id="play-pause-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg>
      </button>
      <button id="btn-next" class="ctrl" title="Next" aria-label="Next">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke-width="2"/></svg>
      </button>
      <!-- Repeat toggle. Balances shuffle on the left so play stays centered.
           JS swaps the icon/label between "repeat all" and "repeat one". -->
      <button id="btn-repeat" class="ctrl" title="Repeat all" aria-label="Repeat all">
        <svg id="repeat-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>
  </aside>

  <!-- Config first (defines window.TUBALR_CONFIG), then modules in dependency order.
       Supabase JS client (CDN, no bundler/npm) is a static tag because supabase.js
       needs window.supabase.createClient synchronously at load. Pinned to an exact
       version + SRI hash so a compromised CDN/package can't inject arbitrary JS;
       the trade-off is that upgrades are a manual bump-and-recompute of the hash
       (curl the file | openssl dgst -sha384 -binary | openssl base64 -A).
       crossorigin is required for SRI on a cross-origin script; jsdelivr sends CORS. -->
  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.8/dist/umd/supabase.js"
    integrity="sha384-M65KxMm/JqBppck6onbmAgPVMBHrmPCf1L17Q+71EcvI9/VVI8j5cqoxQf6lj6h2"
    crossorigin="anonymous"></script>
  <script src="js/config.js"></script>
  <script src="js/lastfm.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/youtube.js"></script>
  <script src="js/playlist.js"></script>
  <script src="js/player.js"></script>
  <script src="js/recent.js"></script>
  <script src="js/genres.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
